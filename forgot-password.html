<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | Northstar Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="auth-page auth-page-centered">
  <div class="page-glow page-glow-left"></div>
  <div class="page-glow page-glow-right"></div>

  <main class="single-shell fade-up">
    <section class="single-card">
      <a href="index.html" class="brand-mark brand-mark-small" aria-label="Northstar Portal home">
        <span class="brand-mark-icon"></span>
        <span>Northstar</span>
      </a>

      <span class="eyebrow">Password recovery</span>
      <h1 class="single-title">Forgot your password?</h1>
      <p class="single-text">Enter your email and we will simulate sending you a secure password reset link.</p>

      <form id="forgotForm" class="auth-form" novalidate>
        <div class="field-group">
          <label for="resetEmail">Email</label>
          <div class="input-shell">
            <span class="input-icon">@</span>
            <input type="email" id="resetEmail" name="resetEmail" placeholder="you@company.com" autocomplete="email" required />
          </div>
          <small class="error-text" data-error-for="resetEmail"></small>
        </div>

        <button type="submit" class="primary-button">Send reset link</button>
        <p class="form-message success-text" id="forgotMessage"></p>
      </form>

      <a href="index.html" class="text-link back-link">← Back to sign in</a>
    </section>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
